<!DOCTYPE html>
<html>
<head>
    <title>Book Cylinder</title>
</head>
<body>

<h2>Gas Cylinder Booking</h2>

<form method="POST">

    <label>Cylinder Type:</label>
    <select name="cylinder_type">
        <option>Domestic</option>
        <option>Commercial</option>
    </select>

    <br><br>

    <label>Amount:</label>
    <input type="text" name="amount" value="1200">

    <br><br>

    <button type="submit">Book Now</button>

</form>

</body>
</html>
