<!DOCTYPE html>
<html>
<head>
    <title>All Bookings</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .box {
            width: 90%;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background: #343a40;
            color: white;
        }

        a button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>

</head>

<body>

<h2>All Bookings</h2>

<div class="box">

    <table>

        <tr>
            <th>ID</th>
            <th>Cylinder Type</th>
            <th>Amount</th>
            <th>Status</th>
        </tr>

        {% for row in bookings %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}

    </table>

    <a href="/admin_dashboard">
        <button>Back to Admin Dashboard</button>
    </a>

</div>

</body>
</html>
