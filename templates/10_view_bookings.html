
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bookings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .header{
            background:linear-gradient(to right,#0d6efd,#0dcaf0);
            color:white;
            padding:25px;
            border-radius:15px;
            text-align:center;
            margin-bottom:20px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">
            📦 Booking Management
        </span>

        <a href="/admin_dashboard" class="btn btn-light">
            Admin Dashboard
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="header">
        <h2>All Cylinder Bookings</h2>
        <p>View and monitor all customer bookings</p>
    </div>

    <div class="card shadow">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover text-center">

                    <thead class="table-dark">
                        <tr>
                            <th>Booking ID</th>
                            <th>Cylinder Type</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>

                    {% for row in bookings %}
                        <tr>
                            <td>{{ row[0] }}</td>
                            <td>{{ row[1] }}</td>
                            <td>₹{{ row[2] }}</td>
                            <td>
                                <span class="badge bg-success">
                                    {{ row[3] }}
                                </span>
                            </td>
                        </tr>
                    {% endfor %}

                    </tbody>

                </table>

            </div>

            <div class="text-center mt-3">
                <a href="/admin_dashboard" class="btn btn-primary">
                    Back to Admin Dashboard
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
