<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(to right, #212529, #495057);
            height: 100vh;
        }

        .admin-card{
            max-width:450px;
            margin:auto;
            margin-top:80px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow admin-card">

        <div class="card-body p-4">

            <h2 class="text-center mb-4">
                🔐 Admin Login
            </h2>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">
                        Username
                    </label>

                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Enter Admin Username"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter Password"
                           required>
                </div>

                <button type="submit"
                        class="btn btn-dark w-100">
                    Login
                </button>

            </form>

            <hr>

            <div class="alert alert-info text-center">
                Only authorized gas agency administrators can access this panel.
            </div>

            <div class="text-center">
                <a href="/" class="btn btn-secondary">
                    Back to Home
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
