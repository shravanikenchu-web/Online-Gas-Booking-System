<!DOCTYPE html>
<html>
<head>
    <title>Online Gas Booking System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            margin: 0;
        }

        .container {
            margin-top: 120px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        button {
            width: 150px;
            padding: 12px;
            margin: 10px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
        }

        .register {
            background: #28a745;
        }

        .login {
            background: #007bff;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Welcome To Online Gas Booking System</h1>
    <p>Book your LPG cylinder online quickly and easily.</p>

    <a href="/register">
        <button class="register">Register</button>
    </a>

    <a href="/login">
        <button class="login">Login</button>
    </a>

</div>

</body>
</html>
