<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Customer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .customer-card{
            max-width:600px;
            margin:auto;
            margin-top:50px;
        }

        .header{
            background:linear-gradient(to right,#198754,#20c997);
            color:white;
            text-align:center;
            padding:20px;
            border-radius:15px 15px 0 0;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <span class="navbar-brand">
            👥 Add Customer
        </span>

        <a href="/admin_dashboard" class="btn btn-light">
            Admin Dashboard
        </a>

    </div>
</nav>

<div class="container">

    <div class="card shadow customer-card">

        <div class="header">
            <h2>Add New Customer</h2>
            <p>Create Customer Account</p>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">
                        Customer Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           placeholder="Enter Customer Name"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Consumer ID
                    </label>

                    <input type="text"
                           name="consumer_id"
                           class="form-control"
                           placeholder="Enter Consumer ID"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Mobile Number
                    </label>

                    <input type="text"
                           name="mobile"
                           class="form-control"
                           placeholder="Enter Mobile Number"
                           required>
                </div>

                <button type="submit"
                        class="btn btn-success w-100">
                    Add Customer
                </button>

            </form>

            <hr>

            <div class="text-center">
                <a href="/admin_dashboard"
                   class="btn btn-secondary">
                    Back
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
