<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Gas Cylinder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .booking-card{
            max-width:600px;
            margin:auto;
            margin-top:50px;
        }

        .header{
            background:linear-gradient(to right,#ff9800,#ff5722);
            color:white;
            padding:20px;
            text-align:center;
            border-radius:15px 15px 0 0;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">
            ⛽ Online Gas Booking System
        </span>

        <a href="/dashboard" class="btn btn-light">
            Dashboard
        </a>
    </div>
</nav>

<div class="container">

    <div class="card shadow booking-card">

        <div class="header">
            <h2>Gas Cylinder Booking</h2>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">
                        Select Cylinder Type
                    </label>

                    <select name="cylinder_type" class="form-select">

                        <option value="Domestic">
                            Domestic Cylinder - ₹1200
                        </option>

                        <option value="Commercial">
                            Commercial Cylinder - ₹2200
                        </option>

                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Amount
                    </label>

                    <input type="text"
                           name="amount"
                           value="1200"
                           class="form-control"
                           readonly>
                </div>

                <button type="submit"
                        class="btn btn-success w-100">
                    Book Now
                </button>

            </form>

            <hr>

            <div class="row text-center">

                <div class="col-md-6">
                    <div class="card border-primary">
                        <div class="card-body">
                            <h5>🏠 Domestic</h5>
                            <p>Suitable for Home Usage</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card border-danger">
                        <div class="card-body">
                            <h5>🏢 Commercial</h5>
                            <p>Suitable for Business Usage</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
