<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            color: #333;
        }

        button {
            width: 220px;
            padding: 12px;
            margin: 10px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
        }

        .view {
            background: #007bff;
        }

        .users {
            background: #17a2b8;
        }

        .userdash {
            background: #28a745;
        }

        .logout {
            background: #dc3545;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Admin Dashboard</h1>
    <h3>Welcome Admin</h3>

    <a href="/view_bookings">
        <button class="view">View All Bookings</button>
    </a>
    <br>

    <a href="/view_users">
        <button class="users">View All Users</button>
    </a>
    <br>

    <a href="/dashboard">
        <button class="userdash">User Dashboard</button>
    </a>
    <br>

    <a href="/logout">
        <button class="logout">Logout</button>
    </a>

</div>

</body>
</html>
