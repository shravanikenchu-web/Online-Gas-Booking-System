<! DOCTYPE html>
<html>
<head>
    <title>View Users</title>
</head>
<body>

<h2>All Registered Users</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
</tr>

{% for row in users %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/admin_dashboard">Back to Admin Dashboard</a>

</body>
</html>
