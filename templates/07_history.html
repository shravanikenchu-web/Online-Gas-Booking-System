<! DOCTYPE html>
<html>
<head>
    <title>Booking History</title>
</head>
<body>

<h2>Booking History</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Cylinder Type</th>
        <th>Amount</th>
        <th>Status</th>
    </tr>

    {% for row in bookings %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
    </tr>
    {% endfor %}

</table>

<br>

<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
